{% extends 'base.html' %} {% block title %}Sign Up - CBS 3i-cell{%
endblock %} {% block content %}
<div class="auth-page-wrapper">
  <!-- Dynamic Background -->
  <div class="background-decor-wrapper">
    <div class="decor-circle circle-1"></div>
    <div class="decor-circle circle-2"></div>
    <div class="decor-circle circle-3"></div>
  </div>

  <div class="auth-card-container size-lg">
    <!-- Header Section -->
    <div class="auth-header-section">
      <div class="brand-logo-container">
        <i class="ph-bold ph-user-plus"></i>
      </div>
      <h1 class="auth-heading">Create Account</h1>
      <p class="auth-subheading">Join the placement cell portal</p>
    </div>

    <!-- Signup Form -->
    <form
      action="{{ url_for('signup_post') }}"
      method="POST"
      enctype="multipart/form-data"
      class="auth-form-stack"
    >
      <!-- Basics Grid -->
      <div class="input-group-card">
        <!-- Role Selection Card -->
        <div class="input-group-card">
          <label class="input-label">I am a</label>
          <input type="hidden" name="role" id="role-input" value="student" />
          <div class="role-selection" style="display: flex; gap: 1rem">
            <div
              class="role-card"
              data-role="student"
              style="
                flex: 1;
                padding: 1rem;
                text-align: center;
                background: var(--surface-input);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                cursor: pointer;
              "
            >
              <i
                class="ph ph-user"
                style="font-size: 2rem; color: var(--primary)"
              ></i
              ><br />Student
            </div>
            <div
              class="role-card"
              data-role="admin"
              style="
                flex: 1;
                padding: 1rem;
                text-align: center;
                background: var(--surface-input);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                cursor: pointer;
              "
            >
              <i
                class="ph ph-users"
                style="font-size: 2rem; color: var(--primary)"
              ></i
              ><br />Admin / Faculty
            </div>
          </div>
        </div>
        <script>
          const roleInput = document.getElementById("role-input");
          document.querySelectorAll(".role-card").forEach((card) => {
            card.addEventListener("click", () => {
              document
                .querySelectorAll(".role-card")
                .forEach((c) => (c.style.borderColor = "var(--border)"));
              card.style.borderColor = "var(--primary)";
              roleInput.value = card.dataset.role;
              updateFormFields();
            });
          });
          // default highlight
          document.querySelector(
            '.role-card[data-role="student"]',
          ).style.borderColor = "var(--primary)";
        </script>
      </div>

      <div class="input-group-card">
        <label for="name" class="input-label">Full Name</label>
        <div class="custom-input-wrapper">
          <i class="ph ph-user input-icon"></i>
          <input
            type="text"
            id="name"
            name="name"
            required
            placeholder="John Doe"
            class="custom-input-field"
          />
        </div>
      </div>

      <div class="input-group-card">
        <label for="email" class="input-label">Email Address</label>
        <div class="custom-input-wrapper">
          <i class="ph ph-envelope input-icon"></i>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="name@example.com"
            class="custom-input-field"
          />
        </div>
      </div>

      <div class="input-group-card">
        <label for="password" class="input-label">Password</label>
        <div class="custom-input-wrapper">
          <i class="ph ph-lock-key input-icon"></i>
          <input
            type="password"
            id="password"
            name="password"
            required
            placeholder="Create strong password"
            class="custom-input-field"
          />
        </div>
      </div>

      <!-- Role Selection handled by JS above -->

      <!-- Admin/Student logic simplified: Just Role choice first -->
      <!-- Details will be collected AFTER login for Students -->
      <!-- For Admin, we can keep the simple level selection or move it too. User focused on Student. Let's keep Admin simple here for now or just hide extra fields/ -->
      <!-- Actually, let's keep Admin Level for Admins, but REMOVE Student Profile Fields (Branch, CGPA, Resume, College ID) -->

      <div id="student-fields" style="display: none">
        <div class="info-alert-box">
          <i class="ph-bold ph-info"></i>
          <p>
            You will be asked to complete your full profile after registration.
          </p>
        </div>
      </div>

      <!-- Admin Specific Fields -->
      <div
        id="admin-faculty-fields"
        style="display: none; animation: slideDown 0.3s ease-out"
      >
        <div class="input-group-card">
          <label for="admin_level" class="input-label">Access Level</label>
          <div class="custom-select-wrapper">
            <i class="ph ph-shield-check input-icon"></i>
            <select
              id="admin_level"
              name="admin_level"
              class="custom-input-field"
            >
              <option value="" disabled selected>Select level</option>
              <option value="super_admin">Super Admin</option>
              <option value="faculty">Faculty</option>
            </select>
            <i class="ph ph-caret-down select-chevron"></i>
          </div>
        </div>
      </div>

      <button type="submit" class="auth-submit-btn">
        <span>Create Account</span>
        <div class="btn-icon-circle">
          <i class="ph-bold ph-arrow-right"></i>
        </div>
      </button>
    </form>

    <div class="auth-footer-section">
      <p>
        Already have an account? <a href="{{ url_for('login') }}">Sign In</a>
      </p>
    </div>
  </div>
</div>



<script>
  function updateFormFields() {
    const role = document.getElementById("role-input").value;
    const studentFields = document.getElementById("student-fields");
    const adminFacultyFields = document.getElementById("admin-faculty-fields");
    const branchInput = document.getElementById("branch");
    const collegeIdInput = document.getElementById("college_id");
    const cgpaInput = document.getElementById("cgpa");
    const resumeInput = document.getElementById("resume");
    const adminLevelInput = document.getElementById("admin_level");

    if (role === "student") {
      studentFields.style.display = "block";
      adminFacultyFields.style.display = "none";
      adminLevelInput.required = false;
    } else if (role === "admin") {
      studentFields.style.display = "none";
      adminFacultyFields.style.display = "block";
      adminLevelInput.required = true;
    } else {
      studentFields.style.display = "none";
      adminFacultyFields.style.display = "none";
    }
  }
</script>
{% endblock %}
