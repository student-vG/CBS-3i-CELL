{% extends 'base.html' %} {% block title %}Forgot Password - Chetan Business
School{% endblock %} {% block content %}
<div class="auth-page-wrapper">
  <!-- Dynamic Background -->
  <div class="background-decor-wrapper">
    <div class="decor-circle circle-1"></div>
    <div class="decor-circle circle-2"></div>
    <div class="decor-circle circle-3"></div>
  </div>

  <div class="auth-card-container">
    <!-- Header Section -->
    <div class="auth-header-section">
      <div class="brand-logo-container">
        <i class="ph-bold ph-key"></i>
      </div>
      <h1 class="auth-heading">Forgot Password?</h1>
      <p class="auth-subheading">Enter your email to receive a reset link</p>
    </div>

    <!-- Forgot Password Form -->
    <form
      action="{{ url_for('forgot_password') }}"
      method="POST"
      class="auth-form-stack"
    >
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <!-- Email Input -->
      <div class="input-group-card">
        <label for="email" class="input-label">Email Address</label>
        <div class="custom-input-wrapper">
          <i class="ph ph-envelope input-icon"></i>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="name@example.com"
            class="custom-input-field"
          />
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="auth-submit-btn">
        <span>Send Reset Link</span>
        <div class="btn-icon-circle">
          <i class="ph-bold ph-paper-plane-right"></i>
        </div>
      </button>

      <div style="text-align: center; margin-top: 1rem">
        <a
          href="{{ url_for('login') }}"
          style="
            color: var(--text-muted);
            font-size: 0.9rem;
            text-decoration: none;
          "
        >
          <i class="ph ph-arrow-left"></i> Back to Login
        </a>
      </div>
    </form>
  </div>
</div>

<style>
  /* Reuse auth styles from login page but ensure they are available here via cached CSS or included block */
  /* This relies on style.css or the inline styles if they were global. 
     Since login.html had inline styles, we need to make sure they apply here too. 
     Optimally, the auth styles should be in style.css, but for now I'll include the key layout styles here 
     to ensure consistency without refactoring everything. */

  .auth-page-wrapper {
    min-height: 100vh;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    position: relative;
    z-index: 1;
  }

  .background-decor-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    z-index: -1;
    pointer-events: none;
  }

  .decor-circle {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.5;
    animation: float 12s ease-in-out infinite;
  }

  .circle-1 {
    top: -10%;
    left: -10%;
    width: 40vh;
    height: 40vh;
    background: #818cf8;
    animation-delay: 0s;
  }
  .circle-2 {
    bottom: -10%;
    right: -10%;
    width: 50vh;
    height: 50vh;
    background: #f43f5e;
    animation-delay: -4s;
  }
  .circle-3 {
    top: 40%;
    left: 30%;
    width: 30vh;
    height: 30vh;
    background: #06b6d4;
    animation-delay: -8s;
    opacity: 0.3;
  }

  @keyframes float {
    0%,
    100% {
      transform: translate(0, 0) scale(1);
    }
    33% {
      transform: translate(30px, -50px) scale(1.1);
    }
    66% {
      transform: translate(-20px, 20px) scale(0.95);
    }
  }

  .auth-card-container {
    /* background: var(--background); */
    background: var(--background);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 32px;
    padding: 2.5rem;
    box-shadow:
      var(--shadow-lg),
      inset 0 0 0 1px var(--border);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 2rem;
  }

  .brand-logo-container {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, var(--primary), #4f46e5);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 2rem;
    margin: 0 auto 1.25rem;
    box-shadow: 0 12px 24px -6px rgba(99, 102, 241, 0.4);
    transform: rotate(-5deg);
  }

  .auth-heading {
    font-size: 1.75rem;
    font-weight: 800;
    color: var(--text-main);
    margin-bottom: 0.5rem;
  }

  .auth-subheading {
    color: var(--text-muted);
    font-size: 0.95rem;
  }

  .auth-header-section {
    text-align: center;
  }

  .input-group-card {
    margin-bottom: 1.25rem;
  }

  .input-label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-main);
    margin-bottom: 0.5rem;
    margin-left: 0.25rem;
  }

  .custom-input-wrapper {
    position: relative;
    border-radius: 16px;
    background: var(--surface-input);
    transition: all 0.2s ease;
    border: 1px solid var(--border); /* Fix for dark mode border visibility */
  }

  .custom-input-wrapper:focus-within {
    box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    border-color: var(--primary);
  }

  .input-icon {
    position: absolute;
    left: 1.25rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 1.1rem;
    pointer-events: none;
  }

  .custom-input-field {
    width: 100%;
    padding: 1rem 1rem 1rem 3.25rem;
    border: 1px solid transparent; /* Default border handled by wrapper */
    border-radius: 16px;
    background: transparent;
    font-size: 1rem;
    color: var(--text-main);
    outline: none;
    font-weight: 500;
  }

  .auth-submit-btn {
    width: 100%;
    padding: 0.75rem 0.75rem 0.75rem 1.5rem;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 20px;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: all 0.3s;
  }

  .auth-submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 30px -5px rgba(99, 102, 241, 0.5);
  }

  .btn-icon-circle {
    width: 42px;
    height: 42px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
  }
</style>
{% endblock %}
