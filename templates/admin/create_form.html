{% extends 'base.html' %}

{% block content %}
<div class="container">
  <div class="glass-card" style="padding: 2rem; max-width: 800px; margin: 0 auto;">
    <h2 class="mb-4" style="color: var(--primary);">Create New Form</h2>
    
    <form action="{{ url_for('dynamic_forms.create_form') }}" method="POST" id="createForm">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="form-group mb-4">
        <label class="form-label">Form Title</label>
        <input type="text" name="title" class="form-control" required placeholder="e.g., Placement Survey 2024">
      </div>
      
      <div class="form-group mb-4">
        <label class="form-label">Description</label>
        <textarea name="description" class="form-control" rows="3" placeholder="Brief description of the form..."></textarea>
      </div>
      
      <hr style="border-color: var(--border); margin: 2rem 0;">
      
      <h4 class="mb-3">Form Fields</h4>
      <div id="fieldsContainer">
        <!-- Dynamic fields will appear here -->
      </div>
      
      <button type="button" class="btn-add-field w-100 mb-5" onclick="addField()">
        <i class="ph-bold ph-plus-circle"></i> Add Another Field
      </button>

      <!-- Hidden input to store JSON structure -->
      <input type="hidden" name="fields_data" id="fieldsData">
      
      <div class="d-flex gap-4" style="margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 2rem;">
        <a href="{{ url_for('dynamic_forms.manage_forms') }}" class="btn-back w-50">← Back to Manage Forms</a>
        <button type="submit" class="btn-primary w-50">Create Form</button>
      </div>
    </form>
  </div>
</div>

<template id="fieldTemplate">
  <div class="field-item">
    <div class="d-flex justify-content-between align-items-start mb-4">
      <div>
        <h5 class="m-0" style="font-weight: 800; color: var(--primary); font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center;">
          <span class="field-index-badge"><span class="field-index"></span></span>
          Field Details
        </h5>
        <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem; margin-left: 0.5rem;">Define the details for this form input</p>
      </div>
      <button type="button" class="remove-btn">
        <i class="ph-bold ph-trash"></i>
      </button>
    </div>
    
    <div class="grid-2" style="gap: 2rem;">
      <div class="form-group mb-0">
        <label class="form-label" style="font-size: 0.9rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.75rem; display: block;">
          <i class="ph ph-text-t" style="margin-right: 0.25rem;"></i> Field Label
        </label>
        <input type="text" class="form-control field-label" required placeholder="e.g., Your Full Name" style="padding: 1rem 1.25rem;">
      </div>
      <div class="form-group mb-0">
        <label class="form-label" style="font-size: 0.9rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.75rem; display: block;">
          <i class="ph ph-list-bullets" style="margin-right: 0.25rem;"></i> Input Type
        </label>
        <select class="form-control field-type" style="padding: 1rem 1.25rem; height: auto;">
          <option value="text">Short Text</option>
          <option value="textarea">Long Text (Paragraph)</option>
          <option value="number">Number Only</option>
          <option value="date">Date Picker</option>
          <option value="file">File Upload</option>
        </select>
      </div>
    </div>
  </div>
</template>

<script>
let fieldCount = 0;

function addField() {
  fieldCount++;
  const container = document.getElementById('fieldsContainer');
  const template = document.getElementById('fieldTemplate');
  const clone = template.content.cloneNode(true);
  
  clone.querySelector('.field-index').textContent = fieldCount;
  clone.querySelector('.remove-btn').onclick = function(e) {
    e.target.closest('.field-item').remove();
    updateJson();
  };
  
  // Attach listeners to update JSON on change
  clone.querySelectorAll('input, select').forEach(el => {
    el.addEventListener('input', updateJson);
  });
  
  container.appendChild(clone);
}

function updateJson() {
  const fields = [];
  document.querySelectorAll('.field-item').forEach(item => {
    fields.push({
      label: item.querySelector('.field-label').value,
      type: item.querySelector('.field-type').value
    });
  });
  document.getElementById('fieldsData').value = JSON.stringify(fields);
}

document.getElementById('createForm').onsubmit = function() {
  updateJson(); // Ensure latest data
  if (document.getElementById('fieldsData').value === '[]') {
    alert("Please add at least one field.");
    return false;
  }
  return true;
};
</script>
{% endblock %}
